<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการป้ายโฆษณา - TOPFORM369</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>* { font-family: 'Prompt', sans-serif; }</style>
</head>
<body class="bg-[#09090b] text-zinc-100 min-h-screen p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <!-- หัวเว็บ -->
        <div class="flex justify-between items-center border-b border-zinc-800 pb-5 mb-8">
            <div>
                <h1 class="text-2xl font-bold text-[#D4AF37] flex items-center gap-2">
                    <i class="fas fa-ad"></i> ระบบจัดการป้ายโฆษณา (Banner Ads)
                </h1>
                <p class="text-xs text-zinc-400 mt-1">เพิ่ม ลบ หรือเปิด-ปิด ป้ายโฆษณาบนหน้าเว็บ TOPFORM369 แบบ Real-time</p>
            </div>
            <button onclick="fetchBanners()" class="bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-lg text-sm font-semibold flex items-center gap-2 border border-zinc-700 transition">
                <i class="fas fa-sync-alt"></i> รีเฟรช
            </button>
        </div>

        <!-- ฟอร์มเพิ่มโฆษณาใหม่ -->
        <div class="bg-[#121215] p-6 rounded-2xl border border-zinc-800 shadow-xl mb-8">
            <h2 class="text-lg font-bold text-white mb-4 flex items-center gap-2">
                <i class="fas fa-plus-circle text-[#D4AF37]"></i> เพิ่มป้ายโฆษณาใหม่
            </h2>
            <form id="bannerForm" onsubmit="saveBanner(event)" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="text-xs text-zinc-400 block mb-1 font-semibold">ชื่อผู้สนับสนุน / ชื่อป้าย *</label>
                    <input type="text" id="title" required placeholder="เช่น UFA สล็อตเว็บตรง" class="w-full bg-[#1a1a1e] border border-zinc-700 rounded-lg p-2.5 text-sm text-white focus:outline-none focus:border-[#D4AF37]">
                </div>
                <div>
                    <label class="text-xs text-zinc-400 block mb-1 font-semibold">ลำดับการแสดงผล (เลขน้อยขึ้นก่อน) *</label>
                    <input type="number" id="sort_order" value="1" required class="w-full bg-[#1a1a1e] border border-zinc-700 rounded-lg p-2.5 text-sm text-white focus:outline-none focus:border-[#D4AF37]">
                </div>
                <div>
                    <label class="text-xs text-zinc-400 block mb-1 font-semibold">ลิงก์รูปภาพ (Image URL) *</label>
                    <input type="url" id="image_url" required placeholder="https://..." class="w-full bg-[#1a1a1e] border border-zinc-700 rounded-lg p-2.5 text-sm text-white focus:outline-none focus:border-[#D4AF37]">
                </div>
                <div>
                    <label class="text-xs text-zinc-400 block mb-1 font-semibold">ลิงก์เมื่อกดคลิก (Target URL) *</label>
                    <input type="url" id="target_url" required placeholder="https://..." class="w-full bg-[#1a1a1e] border border-zinc-700 rounded-lg p-2.5 text-sm text-white focus:outline-none focus:border-[#D4AF37]">
                </div>
                <div class="md:col-span-2 mt-2">
                    <button type="submit" class="w-full bg-gradient-to-r from-[#D4AF37] to-[#F3E5AB] hover:opacity-90 text-black font-extrabold py-3 rounded-xl shadow-lg transition">
                        <i class="fas fa-save mr-1"></i> บันทึกและนำไปแสดงบนหน้าเว็บทันที
                    </button>
                </div>
            </form>
        </div>

        <!-- รายการป้ายโฆษณาที่มีในระบบ -->
        <div class="bg-[#121215] p-6 rounded-2xl border border-zinc-800 shadow-xl">
            <h2 class="text-lg font-bold text-white mb-4">ป้ายโฆษณาทั้งหมดในระบบ</h2>
            <div id="banner-list" class="space-y-4">
                <p class="text-center text-zinc-500 py-8">กำลังโหลดข้อมูล...</p>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://pcrurldhpubyznrdackb.supabase.co/rest/v1/tbl_banners";
        const API_KEY = "sb_publishable_iM2V0yw1KKfpGVwa7LwDXg_KbL3lGG0";

        const headers = {
            "apikey": API_KEY,
            "Authorization": `Bearer ${API_KEY}`,
            "Content-Type": "application/json",
            "Prefer": "return=representation"
        };

        // ดึงข้อมูลโฆษณามาแสดงในตารางหลังบ้าน
        async function fetchBanners() {
            const list = document.getElementById("banner-list");
            try {
                const res = await fetch(`${SUPABASE_URL}?order=sort_order.asc`, { headers });
                const data = await res.json();

                if (!data || data.length === 0) {
                    list.innerHTML = `<p class="text-center text-zinc-500 py-8">ยังไม่มีป้ายโฆษณาในระบบ</p>`;
                    return;
                }

                let html = "";
                data.forEach(ad => {
                    html += `
                        <div class="bg-[#1a1a1e] border ${ad.is_active ? 'border-zinc-700' : 'border-red-900/50 opacity-60'} p-4 rounded-xl flex flex-col md:flex-row items-center justify-between gap-4">
                            <div class="w-full md:w-48 shrink-0 bg-black/50 p-1 rounded border border-zinc-800">
                                <img src="${ad.image_url}" alt="banner" class="w-full h-16 object-cover rounded" onerror="this.src='https://via.placeholder.com/400x100?text=Image+Error'">
                            </div>
                            <div class="flex-grow text-center md:text-left">
                                <div class="flex items-center justify-center md:justify-start gap-2">
                                    <span class="font-bold text-white text-base">${ad.title}</span>
                                    <span class="text-xs px-2 py-0.5 rounded font-mono ${ad.is_active ? 'bg-green-500/20 text-green-400 border border-green-500/30' : 'bg-red-500/20 text-red-400 border border-red-500/30'}">
                                        ${ad.is_active ? '● กำลังแสดงผล' : '○ ปิดการแสดงผล'}
                                    </span>
                                </div>
                                <p class="text-xs text-zinc-400 mt-1 truncate max-w-md"><i class="fas fa-link text-zinc-600"></i> ${ad.target_url}</p>
                                <p class="text-[11px] text-zinc-500 mt-0.5">ลำดับการแสดงผล: <strong class="text-[#D4AF37]">${ad.sort_order}</strong></p>
                            </div>
                            <div class="flex items-center gap-2 shrink-0 w-full md:w-auto justify-end border-t md:border-t-0 pt-3 md:pt-0 border-zinc-800">
                                <button onclick="toggleActive(${ad.id}, ${ad.is_active})" class="px-3 py-1.5 rounded-lg text-xs font-bold ${ad.is_active ? 'bg-amber-500/10 text-amber-400 hover:bg-amber-500/20' : 'bg-green-500/10 text-green-400 hover:bg-green-500/20'} transition">
                                    ${ad.is_active ? '<i class="fas fa-eye-slash"></i> ปิดโฆษณา' : '<i class="fas fa-eye"></i> เปิดโฆษณา'}
                                </button>
                                <button onclick="deleteBanner(${ad.id})" class="bg-red-500/10 hover:bg-red-500/20 text-red-400 px-3 py-1.5 rounded-lg text-xs font-bold transition">
                                    <i class="fas fa-trash"></i> ลบ
                                </button>
                            </div>
                        </div>
                    `;
                });
                list.innerHTML = html;
            } catch (e) {
                list.innerHTML = `<p class="text-red-400 text-center py-4">โหลดข้อมูลไม่สำเร็จ: ${e.message}</p>`;
            }
        }

        // บันทึกป้ายโฆษณาใหม่
        async function saveBanner(e) {
            e.preventDefault();
            const body = JSON.stringify({
                title: document.getElementById("title").value,
                image_url: document.getElementById("image_url").value,
                target_url: document.getElementById("target_url").value,
                sort_order: parseInt(document.getElementById("sort_order").value) || 1,
                is_active: true
            });

            try {
                const res = await fetch(SUPABASE_URL, { method: "POST", headers, body });
                if (res.ok) {
                    document.getElementById("bannerForm").reset();
                    fetchBanners();
                    alert("เพิ่มป้ายโฆษณาขึ้นหน้าเว็บเรียบร้อยแล้ว!");
                } else {
                    alert("เกิดข้อผิดพลาดในการบันทึก");
                }
            } catch (e) {
                alert("Error: " + e.message);
            }
        }

        // เปิด-ปิด การแสดงผลโฆษณา
        async function toggleActive(id, currentStatus) {
            try {
                await fetch(`${SUPABASE_URL}?id=eq.${id}`, {
                    method: "PATCH",
                    headers,
                    body: JSON.stringify({ is_active: !currentStatus })
                });
                fetchBanners();
            } catch (e) {
                alert("เปลี่ยนสถานะไม่สำเร็จ");
            }
        }

        // ลบป้ายโฆษณา
        async function deleteBanner(id) {
            if (!confirm("คุณต้องการลบป้ายโฆษณานี้ออกอย่างถาวรใช่หรือไม่?")) return;
            try {
                await fetch(`${SUPABASE_URL}?id=eq.${id}`, { method: "DELETE", headers });
                fetchBanners();
            } catch (e) {
                alert("ลบไม่สำเร็จ");
            }
        }

        window.onload = fetchBanners;
    </script>
</body>
</html>
