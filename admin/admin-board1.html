<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOPFORM369 - จัดการบอร์ด 1 (Hero)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

    <div class="admin-container">
        
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1 class="logo-text">TOPFORM<span class="gold-text">369</span></h1>
                <p class="subtitle">Master Panel</p>
            </div>
            <nav class="sidebar-nav">
                <a href="../index.html" class="nav-item"><i class="fas fa-th-large"></i> แดชบอร์ด</a>
                <div class="nav-divider">จัดการบอร์ด</div>
                <a href="admin-board1.html" class="nav-item active"><i class="fas fa-flag"></i> จัดการบอร์ด Hero</a>
                <a href="admin-board2.html" class="nav-item"><i class="fas fa-star"></i> จัดการบอร์ด เซียน VIP</a>
                <a href="admin-board3.html" class="nav-item"><i class="fas fa-trophy"></i> จัดการบอร์ด บอลโลก</a>
                <div class="nav-divider">ระบบ</div>
                <a href="#" class="nav-item"><i class="fas fa-cog"></i> ตั้งค่าเว็บ</a>
            </nav>
        </aside>

        <div class="main-content">
            <header class="topbar">
                <h2 class="page-title">🚩 จัดการบอร์ด 1 : คู่เด็ดประจำวัน (Hero VS)</h2>
                <div class="topbar-actions">
                    <a href="../widget-hero.html" target="_blank" class="btn btn-outline"><i class="fas fa-eye"></i> ดูบอร์ดนี้บนเว็บ</a>
                </div>
            </header>

            <main class="content-wrapper">
                <div class="action-section">
                    <input type="hidden" id="bid-1">

                    <h4 class="text-warning mb-3"><i class="fas fa-trophy me-2"></i>ข้อมูลตรงกลาง</h4>
                    <div class="row g-3 mb-4">
                        <div class="col-md-4"><label>ชื่อรายการแข่งขัน</label><input type="text" id="ln" class="form-control"></div>
                        <div class="col-md-4"><label>เวลาแข่ง</label><input type="text" id="mt" class="form-control"></div>
                        <div class="col-md-4"><label>URL โลโก้ถ้วย</label><input type="text" id="ll" class="form-control"></div>
                    </div>

                    <h4 style="color:#a3e635;" class="mb-3"><i class="fas fa-shield-alt me-2"></i>ทีมเหย้า (ฝั่งซ้าย)</h4>
                    <div class="row g-3 mb-4">
                        <div class="col-md-4"><label>ชื่อทีม</label><input type="text" id="hn" class="form-control"></div>
                        <div class="col-md-4"><label>URL รูปธง</label><input type="text" id="hf" class="form-control"></div>
                        <div class="col-md-4"><label>สีป้าย (HEX)</label><input type="color" id="hc" class="form-control form-control-color w-100" style="height:42px;"></div>
                        <div class="col-md-8"><label>URL รูปนักเตะพื้นใส (.PNG)</label><input type="text" id="hp" class="form-control"></div>
                        <div class="col-md-4"><label>คะแนนโหวตเริ่มต้น</label><input type="number" id="hv" class="form-control"></div>
                    </div>

                    <h4 style="color:#f87171;" class="mb-3"><i class="fas fa-shield-alt me-2"></i>ทีมเยือน (ฝั่งขวา)</h4>
                    <div class="row g-3 mb-4">
                        <div class="col-md-4"><label>ชื่อทีม</label><input type="text" id="an" class="form-control"></div>
                        <div class="col-md-4"><label>URL รูปธง</label><input type="text" id="af" class="form-control"></div>
                        <div class="col-md-4"><label>สีป้าย (HEX)</label><input type="color" id="ac" class="form-control form-control-color w-100" style="height:42px;"></div>
                        <div class="col-md-8"><label>URL รูปนักเตะพื้นใส (.PNG)</label><input type="text" id="ap" class="form-control"></div>
                        <div class="col-md-4"><label>คะแนนโหวตเริ่มต้น</label><input type="number" id="av" class="form-control"></div>
                    </div>

                    <h4 class="text-info mb-3"><i class="fas fa-fire me-2"></i>ทรรศนะ & ราคาต่อรอง</h4>
                    <div class="row g-3 mb-4">
                        <div class="col-md-6"><label>ข้อความราคาบอล</label><input type="text" id="od" class="form-control"></div>
                        <div class="col-md-3"><label>โหวตสกอร์ต่ำ</label><input type="number" id="vu" class="form-control"></div>
                        <div class="col-md-3"><label>โหวตสกอร์สูง</label><input type="number" id="vo" class="form-control"></div>
                    </div>

                    <button class="btn btn-gold w-100 py-3 mt-2" onclick="saveHero()"><i class="fas fa-save me-2"></i>อัปเดตข้อมูลขึ้นบอร์ด Hero VS ทันที</button>
                </div>
            </main>
        </div>
    </div>

    <script>
        const db = window.supabase.createClient('https://pcrurldhpubyznrdackb.supabase.co', 'sb_publishable_iM2V0yw1KKfpGVwa7LwDXg_KbL3lGG0');

        async function loadHero() {
            const r1 = await db.from('tbl_hero_board').select('*').order('id', { ascending: false }).limit(1);
            if(r1.data && r1.data[0]) {
                const d = r1.data[0];
                document.getElementById('bid-1').value = d.id; document.getElementById('ln').value = d.league_name; document.getElementById('mt').value = d.match_time; document.getElementById('ll').value = d.league_logo; document.getElementById('hn').value = d.home_name; document.getElementById('hf').value = d.home_flag; document.getElementById('hc').value = d.home_color; document.getElementById('hp').value = d.home_player; document.getElementById('hv').value = d.vote_home; document.getElementById('an').value = d.away_name; document.getElementById('af').value = d.away_flag; document.getElementById('ac').value = d.away_color; document.getElementById('ap').value = d.away_player; document.getElementById('av').value = d.vote_away; document.getElementById('od').value = d.odds_text; document.getElementById('vu').value = d.vote_under; document.getElementById('vo').value = d.vote_over;
            }
        }

        async function saveHero() {
            try {
                const payload = { league_name: document.getElementById('ln').value, match_time: document.getElementById('mt').value, league_logo: document.getElementById('ll').value, home_name: document.getElementById('hn').value, home_flag: document.getElementById('hf').value, home_color: document.getElementById('hc').value, home_player: document.getElementById('hp').value, vote_home: parseInt(document.getElementById('hv').value||0), away_name: document.getElementById('an').value, away_flag: document.getElementById('af').value, away_color: document.getElementById('ac').value, away_player: document.getElementById('ap').value, vote_away: parseInt(document.getElementById('av').value||0), odds_text: document.getElementById('od').value, vote_under: parseInt(document.getElementById('vu').value||0), vote_over: parseInt(document.getElementById('vo').value||0) };
                const id = document.getElementById('bid-1').value;
                if(!id) { const { data, error } = await db.from('tbl_hero_board').insert([payload]).select(); if(error) throw error; document.getElementById('bid-1').value = data[0].id; } 
                else { const { error } = await db.from('tbl_hero_board').update(payload).eq('id', id); if(error) throw error; }
                alert('✅ อัปเดตบอร์ด Hero เรียบร้อย!');
            } catch(e) { alert('❌ ' + e.message); }
        }

        window.onload = loadHero;
    </script>
</body>
</html>
