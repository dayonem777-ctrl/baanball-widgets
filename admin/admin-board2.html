<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOPFORM369 - จัดการบอร์ด 2 (เซียน VIP)</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="../assets/css/style.css">
<style>
.sp{display:flex;gap:4px;margin-top:6px}.sd{width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:#fff}
.sd.w{background:#22c55e}.sd.l{background:#ef4444}.sd.d{background:#64748b}
.lp{font-size:.75rem;color:#9ca3af;margin-top:4px;word-break:break-all}
</style>
</head>
<body>
<div class="admin-container">
<aside class="sidebar">
<div class="sidebar-header"><h1 class="logo-text">TOPFORM<span class="gold-text">369</span></h1><p class="subtitle">Master Panel</p></div>
<nav class="sidebar-nav">
<a href="../index.html" class="nav-item"><i class="fas fa-th-large"></i> แดชบอร์ด</a>
<div class="nav-divider">จัดการบอร์ด</div>
<a href="admin-board1.html" class="nav-item"><i class="fas fa-flag"></i> จัดการบอร์ด Hero</a>
<a href="admin-board2.html" class="nav-item active"><i class="fas fa-star"></i> จัดการบอร์ด เซียน VIP</a>
<a href="admin-board3.html" class="nav-item"><i class="fas fa-trophy"></i> จัดการบอร์ด บอลโลก</a>
<div class="nav-divider">ระบบ</div>
<a href="#" class="nav-item"><i class="fas fa-cog"></i> ตั้งค่าเว็บ</a>
</nav>
</aside>

<div class="main-content">
<header class="topbar">
<h2 class="page-title">⭐ จัดการบอร์ด 2 : ระบบคุมทีเด็ดเซียน VIP</h2>
<div class="topbar-actions"><a href="../widget-gurus.html" target="_blank" class="btn btn-outline"><i class="fas fa-eye"></i> ดูบอร์ดนี้บนเว็บ</a></div>
</header>

<main class="content-wrapper">
<div class="action-section mb-4">
<input type="hidden" id="bid-2">
<label class="text-warning fw-bold mb-2">ข้อความหัวเรื่องบอร์ดบนสุด</label>
<input type="text" id="g-head" class="form-control fw-bold fs-5 text-warning" value="🔥 ทีเด็ดเซียนบอล VIP ประจำวัน">
</div>

<div class="action-section mb-4" style="border-color:rgba(0,255,102,.3)">
<h4 class="text-success mb-3"><i class="fas fa-plus-circle me-2"></i>ฟอร์มเพิ่ม/แก้ไขข้อมูลเซียน <span id="edit-mode-label" class="badge bg-danger ms-2" style="display:none">กำลังแก้ไข</span></h4>
<input type="hidden" id="edit-idx" value="-1">
<div class="row g-3">
<div class="col-md-4"><label><i class="fas fa-user text-warning"></i> ชื่อเซียน</label><input type="text" id="t-name" class="form-control" placeholder="เช่น เฮียกบ"></div>
<div class="col-md-5"><label><i class="fas fa-image text-info"></i> URL รูปโปรไฟล์</label><input type="text" id="t-img" class="form-control" placeholder="https://..."></div>
<div class="col-md-3"><label><i class="fas fa-percentage text-success"></i> อัตราเข้าวิน (%)</label><input type="number" id="t-percent" class="form-control text-success fw-bold" placeholder="80" min="0" max="100"></div>
<div class="col-md-4"><label><i class="fas fa-trophy text-warning"></i> ชื่อลีก</label><input type="text" id="t-league" class="form-control" placeholder="พรีเมียร์ลีก อังกฤษ"></div>
<div class="col-md-5"><label><i class="fas fa-futbol text-info"></i> คู่บอลวิเคราะห์</label><input type="text" id="t-match" class="form-control" placeholder="เชลซี vs อาร์เซนอล"></div>
<div class="col-md-3"><label><i class="fas fa-flag-checkered"></i> ป้ายสถานะ</label>
<select id="t-status" class="form-select fw-bold">
<option value="WAIT">⏳ WAIT (รอ)</option><option value="WIN">✔ WIN</option><option value="LOSE">✖ LOSE</option>
</select></div>
<div class="col-md-8"><label><i class="fas fa-crosshairs text-danger"></i> ทีเด็ดฟันธง</label><input type="text" id="t-pick" class="form-control text-warning fw-bold fs-5" placeholder="เชลซี ต่อ -0.5"></div>
<div class="col-md-4"><label><i class="fas fa-chart-line text-info"></i> สถิติ 5 นัดหลัง (คั่นด้วย ,)</label><input type="text" id="t-record" class="form-control text-info fw-bold" placeholder="W,W,L,W,W" oninput="pvS()"><div id="sp" class="sp"></div></div>
<div class="col-md-6"><label><i class="fas fa-link text-success"></i> ลิงค์บทวิเคราะห์ / Line / FB / IG</label><input type="text" id="t-link" class="form-control" placeholder="https://..." oninput="pvL()"><div class="lp" id="lp"></div></div>
<div class="col-md-3"><label><i class="fas fa-share-alt"></i> ประเภทลิงค์</label>
<select id="t-link-type" class="form-select fw-bold" onchange="pvL()">
<option value="analysis">📖 บทวิเคราะห์</option><option value="line">💬 LINE</option><option value="facebook">📘 Facebook</option><option value="instagram">📸 Instagram</option><option value="telegram">✈️ Telegram</option><option value="other">🔗 อื่นๆ</option>
</select></div>
<div class="col-md-3"><label><i class="fas fa-eye"></i> จำนวนวิว</label><input type="number" id="t-views" class="form-control" placeholder="0" min="0" value="0"></div>
</div>
<div class="mt-4">
<button class="btn btn-gold px-4" onclick="pushG()"><i class="fas fa-arrow-down me-2"></i>เพิ่ม/อัปเดตรายการ</button>
<button class="btn btn-outline px-3 ms-2" onclick="resetT()"><i class="fas fa-times me-1"></i>ยกเลิก</button>
</div>
</div>

<div class="action-section">
<h4 class="text-warning mb-3">📋 จัดลำดับบล็อกที่จะแสดง (<span id="cnt" class="text-white">0</span> บล็อก)</h4>
<div id="list-render" class="mb-4"></div>
<button class="btn btn-gold w-100 py-3 fs-5" onclick="saveCloud()"><i class="fas fa-cloud-upload-alt me-2"></i>อัปเดตบล็อกทั้งหมดขึ้นหน้าเว็บ ทันที</button>
</div>
</main>
</div>
</div>

<script>
const db=window.supabase.createClient('https://pcrurldhpubyznrdackb.supabase.co','sb_publishable_iM2V0yw1KKfpGVwa7LwDXg_KbL3lGG0');
let gL=[];
const IC={analysis:'📖',line:'💬',facebook:'📘',instagram:'📸',telegram:'✈️',other:'🔗'};

async function loadGurus(){
const r=await db.from('wb_gurus_pro').select('*').order('id',{ascending:false}).limit(1);
if(r.data&&r.data[0]){document.getElementById('bid-2').value=r.data[0].id;document.getElementById('g-head').value=r.data[0].header_title||'';gL=r.data[0].gurus_list||[];draw();}
}

function pvS(){
const v=document.getElementById('t-record').value,b=document.getElementById('sp');
if(!v){b.innerHTML='';return;}
b.innerHTML=v.split(',').slice(0,5).map(s=>{const x=s.trim().toUpperCase();if(['W','WIN'].includes(x))return'<div class="sd w">W</div>';if(['L','LOSE'].includes(x))return'<div class="sd l">L</div>';return'<div class="sd d">-</div>';}).join('');
}

function pvL(){
const u=document.getElementById('t-link').value,t=document.getElementById('t-link-type').value,b=document.getElementById('lp');
if(!u){b.innerHTML='';return;}
b.innerHTML=`${IC[t]||'🔗'} ${t.toUpperCase()} → ${u.substring(0,50)}${u.length>50?'...':''}`;
}

function draw(){
const b=document.getElementById('list-render');
document.getElementById('cnt').innerText=gL.length;
if(gL.length===0){b.innerHTML='<p class="text-muted text-center py-4">ยังไม่มีบล็อกข้อมูล</p>';return;}
b.innerHTML='';
gL.forEach((g,i)=>{
const sc=g.status==='WIN'?'success':g.status==='LOSE'?'danger':'secondary';
const sa=(g.record||'').toString().split(',').slice(0,5);
const sh=sa.map(s=>{const x=s.trim().toUpperCase();if(['W','WIN'].includes(x))return'<span class="sd w">W</span>';if(['L','LOSE'].includes(x))return'<span class="sd l">L</span>';return'<span class="sd d">-</span>';}).join('');
const li=IC[g.linkType||'analysis'];
b.innerHTML+=`<div class="dynamic-item"><div class="d-flex align-items-center gap-3 flex-grow-1">
<span class="badge bg-warning text-dark fs-6 px-3">${i+1}</span>
<img src="${g.img}" style="width:50px;height:50px;border-radius:50%;object-fit:cover;border:2px solid #FFD700" onerror="this.src='https://cdn-icons-png.flaticon.com/512/4140/4140048.png'">
<div class="flex-grow-1">
<div class="fw-bold fs-6 text-white">${g.name} <span class="badge bg-success ms-1">${g.percent||0}%</span> <span class="badge bg-${sc} ms-1">${g.status||'WAIT'}</span></div>
<div style="font-size:.82rem;color:#ccc"><i class="fas fa-trophy text-warning"></i> ${g.league||'-'} | <i class="fas fa-futbol"></i> ${g.match||'-'}</div>
<div style="font-size:.85rem;color:#FFD700;font-weight:600">🎯 ${g.pick||'-'}</div>
<div class="d-flex align-items-center gap-2 mt-1"><div class="sp" style="margin:0">${sh}</div>${g.link?`<span style="font-size:.75rem;color:#9ca3af">${li} ${g.linkType||'analysis'}</span>`:''}</div>
</div></div>
<div class="d-flex gap-1">
<button class="btn btn-outline p-2" onclick="sw(${i},-1)" ${i===0?'disabled':''}><i class="fas fa-arrow-up"></i></button>
<button class="btn btn-outline p-2" onclick="sw(${i},1)" ${i===gL.length-1?'disabled':''}><i class="fas fa-arrow-down"></i></button>
<button class="btn btn-outline p-2 text-info" onclick="ed(${i})"><i class="fas fa-edit"></i></button>
<button class="btn btn-outline p-2 text-danger" onclick="dl(${i})"><i class="fas fa-trash"></i></button>
</div></div>`;
});
}

function pushG(){
const n=document.getElementById('t-name').value.trim();
if(!n)return alert('⚠️ ใส่ชื่อเซียนก่อนครับ');
const o={name:n,img:document.getElementById('t-img').value.trim()||'https://cdn-icons-png.flaticon.com/512/4140/4140048.png',percent:parseInt(document.getElementById('t-percent').value)||80,league:document.getElementById('t-league').value.trim(),match:document.getElementById('t-match').value.trim(),pick:document.getElementById('t-pick').value.trim(),record:document.getElementById('t-record').value.trim(),status:document.getElementById('t-status').value,link:document.getElementById('t-link').value.trim(),linkType:document.getElementById('t-link-type').value,views:parseInt(document.getElementById('t-views').value)||0};
const i=parseInt(document.getElementById('edit-idx').value);
if(i>=0){gL[i]=o;alert('✅ อัปเดตเรียบร้อย');}else{gL.push(o);alert('✅ เพิ่มเรียบร้อย');}
resetT();draw();
}

function ed(i){
const g=gL[i];
document.getElementById('edit-idx').value=i;
document.getElementById('t-name').value=g.name||'';
document.getElementById('t-img').value=g.img||'';
document.getElementById('t-percent').value=g.percent||80;
document.getElementById('t-league').value=g.league||'';
document.getElementById('t-match').value=g.match||'';
document.getElementById('t-pick').value=g.pick||'';
document.getElementById('t-record').value=g.record||'';
document.getElementById('t-status').value=g.status||'WAIT';
document.getElementById('t-link').value=g.link||'';
document.getElementById('t-link-type').value=g.linkType||'analysis';
document.getElementById('t-views').value=g.views||0;
document.getElementById('edit-mode-label').style.display='inline-block';
pvS();pvL();window.scrollTo({top:0,behavior:'smooth'});
}

function dl(i){if(confirm('🗑️ ลบบล็อกนี้?')){gL.splice(i,1);draw();}}
function sw(i,d){const j=i+d;if(j<0||j>=gL.length)return;const t=gL[i];gL[i]=gL[j];gL[j]=t;draw();}

function resetT(){
document.getElementById('edit-idx').value=-1;
['t-name','t-img','t-percent','t-league','t-match','t-pick','t-record','t-link'].forEach(id=>document.getElementById(id).value='');
document.getElementById('t-status').value='WAIT';
document.getElementById('t-link-type').value='analysis';
document.getElementById('t-views').value=0;
document.getElementById('edit-mode-label').style.display='none';
document.getElementById('sp').innerHTML='';
document.getElementById('lp').innerHTML='';
}

async function saveCloud(){
if(gL.length===0)return alert('⚠️ ยังไม่มีข้อมูล');
const p={header_title:document.getElementById('g-head').value,gurus_list:gL};
const id=document.getElementById('bid-2').value;
if(!id){const{data,error}=await db.from('wb_gurus_pro').insert([p]).select();if(error)return alert('❌ '+error.message);document.getElementById('bid-2').value=data[0].id;}
else{const{error}=await db.from('wb_gurus_pro').update(p).eq('id',id);if(error)return alert('❌ '+error.message);}
alert('🎉 อัปเดตขึ้นเว็บเรียบร้อย!');
}

window.onload=loadGurus;
</script>
</body>
</html>
