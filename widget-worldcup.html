<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TOPFORM369</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        font-family: "Prompt", sans-serif;
      }
      .gold-glow {
        box-shadow: 0 0 15px rgba(212, 175, 55, 0.15);
      }

      /* ซ่อน Scrollbar แต่ลากได้ */
      .hide-scroll::-webkit-scrollbar {
        display: none;
      }
      .hide-scroll {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      /* เปลี่ยนเคอร์เซอร์ตอนคลิกเมาส์ค้าง */
      .cursor-grab {
        cursor: grab;
      }
      .cursor-grabbing {
        cursor: grabbing !important;
      }

      /* =========================================
         3D Liquid Glass Card (เอฟเฟกต์หยดน้ำนูน)
      ========================================= */
      .glass-card {
        background: linear-gradient(135deg, rgba(28, 28, 30, 0.85) 0%, rgba(12, 12, 14, 0.95) 100%);
        border-top: 1px solid rgba(255, 255, 255, 0.15);
        border-left: 1px solid rgba(255, 255, 255, 0.1);
        border-right: 1px solid rgba(197, 160, 89, 0.15);
        border-bottom: 1px solid rgba(197, 160, 89, 0.1);
        border-radius: 24px; /* โค้งมนแบบหยดน้ำ */
        
        /* มิติเงานูนเว้าแบบเลนส์ */
        box-shadow: 
            0 20px 40px rgba(0, 0, 0, 0.6),
            inset 0 2px 4px rgba(255, 255, 255, 0.15),
            inset 0 -4px 12px rgba(0, 0, 0, 0.6),
            inset 0 0 15px rgba(212, 175, 55, 0.05);
            
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        position: relative;
        overflow: hidden;
      }

      /* แสงสะท้อนทรงโค้งวาบด้านบนการ์ด (Glossy Highlight) */
      .glass-card::after {
        content: '';
        position: absolute;
        top: 0; left: 5%; width: 90%; height: 40%;
        background: linear-gradient(to bottom, rgba(255, 255, 255, 0.06) 0%, rgba(255, 255, 255, 0) 100%);
        border-radius: 50% / 0 0 40% 40%;
        pointer-events: none;
      }

      .glass-card:hover {
        transform: translateY(-8px) scale(1.02);
        border-top-color: rgba(255, 255, 255, 0.3);
        border-right-color: rgba(212, 175, 55, 0.5);
        box-shadow: 
            0 30px 50px rgba(0, 0, 0, 0.8),
            0 0 25px rgba(212, 175, 55, 0.2),
            inset 0 2px 6px rgba(255, 255, 255, 0.25),
            inset 0 -2px 15px rgba(212, 175, 55, 0.05);
      }

      /* =========================================
         ปุ่มเจล 3D (3D Gel Button)
      ========================================= */
      .btn-glass {
        background: linear-gradient(180deg, #ffffff 0%, #e4e4e7 100%);
        color: #000000;
        border-top: 1px solid #ffffff;
        border-bottom: 1px solid #a1a1aa;
        border-radius: 12px;
        box-shadow: 
            0 6px 20px rgba(255, 255, 255, 0.1),
            inset 0 3px 6px rgba(255, 255, 255, 0.8),
            inset 0 -3px 6px rgba(0, 0, 0, 0.1);
        transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
      }
      .btn-glass:hover {
        transform: translateY(-2px);
        box-shadow: 
            0 10px 25px rgba(255, 255, 255, 0.2),
            inset 0 4px 8px rgba(255, 255, 255, 0.9),
            inset 0 -4px 8px rgba(0, 0, 0, 0.15);
      }
      .btn-glass:active {
        transform: translateY(1px);
        box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.2);
      }
    </style>
  </head>
  <body class="bg-transparent p-4">
    <div
      id="wc-mount"
      class="max-w-7xl mx-auto bg-[#09090b] text-white p-5 md:p-8 rounded-2xl border border-zinc-800 shadow-2xl relative overflow-hidden font-sans"
    >
      <div class="flex justify-center items-center py-20">
        <p class="text-zinc-500 animate-pulse text-lg">
          กำลังดึงโปรแกรมการแข่งขัน...
        </p>
      </div>
    </div>

    <div
      id="iframe-modal"
      class="fixed inset-0 z-50 bg-black/80 backdrop-blur-sm hidden flex justify-center items-center p-3 md:p-6"
    >
      <div
        class="bg-[#121215] border border-zinc-700 w-full max-w-4xl max-h-[90vh] rounded-2xl overflow-hidden flex flex-col shadow-2xl"
      >
        <div
          class="p-4 bg-[#1a1a1e] border-b border-zinc-800 flex justify-between items-center"
        >
          <span
            class="font-bold text-[#D4AF37] flex items-center gap-2 text-sm"
          >
            <i class="fas fa-trophy"></i> ตารางคะแนน & สถิติการแข่งขันทั้งหมด
          </span>
          <button
            onclick="closeModal()"
            class="text-zinc-400 hover:text-white bg-zinc-800 hover:bg-red-500 px-3 py-1 rounded-lg text-xs font-bold transition-colors"
          >
            ปิดหน้าต่าง X
          </button>
        </div>
        <div
          id="iframe-container"
          class="p-4 overflow-y-auto flex-grow bg-black/50 min-h-[400px]"
        ></div>
      </div>
    </div>

    <script>
      const DB_URL =
        "https://pcrurldhpubyznrdackb.supabase.co/rest/v1/tbl_worldcup_board";
      const API_KEY = "sb_publishable_iM2V0yw1KKfpGVwa7LwDXg_KbL3lGG0";
      let timerInterval = null;
      let storedIframeCode = "";

      async function initWorldCup() {
        const mount = document.getElementById("wc-mount");
        try {
          const res = await fetch(DB_URL, {
            headers: { apikey: API_KEY, Authorization: `Bearer ${API_KEY}` },
          });
          const data = await res.json();

          if (!data || data.length === 0) {
            mount.innerHTML =
              '<p class="text-center text-zinc-500 py-12">ยังไม่มีข้อมูลในระบบฐานข้อมูลครับ</p>';
            return;
          }

          const d = data[data.length - 1];
          const list = d.matches_list || [];
          storedIframeCode = d.iframe_code || "";

          let html = `
                    <div class="absolute top-0 right-0 w-96 h-96 bg-yellow-500/5 rounded-full blur-3xl pointer-events-none"></div>

                    <div class="bg-gradient-to-r from-[#121215] via-[#1a1a1e] to-[#121215] p-6 rounded-xl border border-zinc-800 flex flex-col md:flex-row justify-between items-start md:items-center gap-5 mb-8 gold-glow">
                        <div>
                            <div class="flex items-center gap-2 text-[#D4AF37] font-bold tracking-widest text-xs md:text-sm uppercase mb-1">
                                <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24"><path d="M19 5h-2V3H7v2H5c-1.1 0-2 .9-2 2v1c0 2.55 1.92 4.63 4.39 4.94.63 1.5 1.98 2.63 3.61 2.96V19H7v2h10v-2h-4v-3.1c1.63-.33 2.98-1.46 3.61-2.96C19.08 12.63 21 10.55 21 8V7c0-1.1-.9-2-2-2zM5 8V7h2v3.82C5.84 10.4 5 9.3 5 8zm14 0c0 1.3-.84 2.4-2 2.82V7h2v1z"/></svg>
                                <span>${
                                  d.top_badge || "FIFA WORLD CUP 2026"
                                }</span>
                            </div>
                            <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-white via-zinc-200 to-zinc-400">${
                              d.header_title
                            }</h1>
                            <p class="text-zinc-400 text-xs md:text-sm mt-2">
                                <span class="text-black bg-white px-2 py-0.5 rounded font-bold">${
                                  d.today_count
                                }</span> 
                                <span class="mx-2 text-zinc-600">|</span> 
                                <span class="text-[#A1A1AA]">${
                                  d.upcoming_count
                                }</span>
                            </p>
                        </div>

                        <div class="bg-black/80 border border-zinc-700 px-6 py-4 rounded-xl flex items-center justify-between gap-4 backdrop-blur-md shadow-inner w-full md:w-auto">
                            <span class="text-xs text-zinc-400 font-medium whitespace-nowrap">เตะนัดถัดไปอีก</span>
                            <div id="wc-timer" class="flex items-baseline gap-1.5 font-mono font-bold">
                                <span class="text-yellow-400 text-xl">0</span><span class="text-[10px] text-zinc-500">วัน</span> :
                                <span class="text-yellow-400 text-xl">00</span><span class="text-[10px] text-zinc-500">ชม.</span> :
                                <span class="text-yellow-400 text-xl">00</span><span class="text-[10px] text-zinc-500">นาที</span> :
                                <span class="text-yellow-400 text-xl">00</span><span class="text-[10px] text-zinc-500">วิ</span>
                            </div>
                        </div>
                    </div>
                `;

          if (list.length === 0) {
            html += `<p class="text-center text-zinc-500 py-12 bg-[#121215] rounded-xl border border-zinc-800">ยังไม่ได้เพิ่มแมตช์การแข่งขันในระบบแอดมินหลังบ้านครับ</p>`;
          } else {
            html += `<div id="slider-container" class="flex flex-row overflow-x-auto gap-6 relative z-10 pb-4 snap-x snap-mandatory hide-scroll cursor-grab">`;

            list.forEach((m) => {
              const hRate = m.rate || 50;
              const aRate = 100 - hRate;

              html += `
                            <div class="glass-card min-w-[300px] md:min-w-[350px] flex-none snap-start p-6 flex flex-col justify-between group select-none">
                                <div class="relative z-10">
                                    <div class="flex justify-between items-center mb-5">
                                        <span class="text-xs font-semibold text-[#A1A1AA] font-mono">${
                                          m.date
                                        }</span>
                                        <span class="bg-white text-black text-[10px] font-black px-2.5 py-0.5 rounded tracking-wider uppercase">${
                                          m.badge
                                        }</span>
                                    </div>

                                    <div class="grid grid-cols-3 items-center my-5 pointer-events-none">
                                        <div class="flex flex-col items-center text-center gap-2">
                                            <div class="w-16 h-10 rounded overflow-hidden shadow-md bg-[#0a0a0c] border border-zinc-700/50 flex items-center justify-center">
                                                <img src="${m.h_flag}" alt="${
                m.h_name
              }" class="w-full h-full object-cover" onerror="this.src='https://flagcdn.com/w80/un.png'">
                                            </div>
                                            <span class="font-bold text-sm md:text-base text-white line-clamp-1 mt-1 drop-shadow-md">${
                                              m.h_name
                                            }</span>
                                        </div>

                                        <div class="flex justify-center">
                                            <span class="text-sm font-black text-[#D4AF37] bg-black/40 px-3.5 py-1.5 rounded-full border border-[#D4AF37]/40 shadow-[0_0_15px_rgba(212,175,55,0.2)] backdrop-blur-sm">VS</span>
                                        </div>

                                        <div class="flex flex-col items-center text-center gap-2">
                                            <div class="w-16 h-10 rounded overflow-hidden shadow-md bg-[#0a0a0c] border border-zinc-700/50 flex items-center justify-center">
                                                <img src="${m.a_flag}" alt="${
                m.a_name
              }" class="w-full h-full object-cover" onerror="this.src='https://flagcdn.com/w80/un.png'">
                                            </div>
                                            <span class="font-bold text-sm md:text-base text-white line-clamp-1 mt-1 drop-shadow-md">${
                                              m.a_name
                                            }</span>
                                        </div>
                                    </div>
                                </div>

                                <div class="relative z-10">
                                    <div class="mt-6 pt-4 border-t border-zinc-700/50 pointer-events-none">
                                        <div class="flex justify-between text-xs mb-2">
                                            <span class="text-zinc-300 drop-shadow">เซียนเลือก <strong class="text-[#F3E5AB] font-mono ml-1">${hRate}%</strong></span>
                                            <span class="text-zinc-400 font-mono drop-shadow">${aRate}%</span>
                                        </div>
                                        <div class="w-full bg-black/60 h-1.5 rounded-full overflow-hidden flex p-0.5 border border-zinc-800/80 shadow-inner">
                                            <div class="bg-gradient-to-r from-[#D4AF37] to-[#F3E5AB] h-full rounded-l-full shadow-[0_0_8px_rgba(212,175,55,0.5)]" style="width: ${hRate}%"></div>
                                            <div class="bg-zinc-600/50 h-full rounded-r-full" style="width: ${aRate}%"></div>
                                        </div>
                                    </div>

                                    <div class="flex justify-between items-center mt-5 pt-4 border-t border-zinc-700/50">
                                        <span class="text-yellow-400 font-mono font-bold text-sm flex items-center gap-1.5 pointer-events-none drop-shadow-md">
                                            <span class="w-1.5 h-1.5 rounded-full bg-yellow-400 animate-pulse shadow-[0_0_8px_#facc15]"></span>
                                            ${m.time}
                                        </span>
                                        <a href="${
                                          m.url || "#"
                                        }" target="_blank" class="text-xs font-semibold text-[#e4e4e7] hover:text-[#F3E5AB] flex items-center gap-1 transition-transform relative z-20 drop-shadow">
                                            วิเคราะห์ · ราคาบอล <span class="text-[#D4AF37] font-bold">→</span>
                                        </a>
                                    </div>
                                </div>
                            </div>
                        `;
            });

            html += `</div>`;
          }

          html += `
                    <footer class="mt-8 pt-6 border-t border-zinc-800/80 flex justify-start relative z-10">
                        <button onclick="openModal()" class="btn-glass font-extrabold px-6 py-3.5 flex items-center gap-2.5 text-sm group cursor-pointer">
                            <span>ดูโปรแกรมทั้งหมด</span>
                            <svg class="w-4 h-4 fill-current group-hover:translate-x-1 transition-transform" viewBox="0 0 24 24"><path d="M5 13h11.17l-4.88 4.88c-.39.39-.39 1.03 0 1.42.39.39 1.02.39 1.41 0l6.59-6.59c.39-.39.39-1.02 0-1.41l-6.58-6.6a.9959.9959 0 0 0-1.41 0c-.39.39-.39 1.02 0 1.41L16.17 11H5c-.55 0-1 .45-1 1s.45 1 1 1z"/></svg>
                        </button>
                    </footer>
                `;

          mount.innerHTML = html;

          if (list.length > 0) enableDragScroll();
          if (d.countdown_target) runTimer(d.countdown_target);
        } catch (e) {
          mount.innerHTML = `<p class="text-red-500 text-center py-12 bg-red-500/10 rounded-xl border border-red-500/20">เกิดข้อผิดพลาดในการโหลดข้อมูล: ${e.message}</p>`;
        }
      }

      function enableDragScroll() {
        const slider = document.getElementById("slider-container");
        let isDown = false;
        let startX;
        let scrollLeft;

        slider.addEventListener("mousedown", (e) => {
          isDown = true;
          slider.classList.add("cursor-grabbing");
          slider.style.scrollSnapType = "none";
          startX = e.pageX - slider.offsetLeft;
          scrollLeft = slider.scrollLeft;
        });

        slider.addEventListener("mouseleave", () => {
          isDown = false;
          slider.classList.remove("cursor-grabbing");
          slider.style.scrollSnapType = "x mandatory";
        });

        slider.addEventListener("mouseup", () => {
          isDown = false;
          slider.classList.remove("cursor-grabbing");
          slider.style.scrollSnapType = "x mandatory";
        });

        slider.addEventListener("mousemove", (e) => {
          if (!isDown) return;
          e.preventDefault();
          const x = e.pageX - slider.offsetLeft;
          const walk = (x - startX) * 1.5;
          slider.scrollLeft = scrollLeft - walk;
        });
      }

      function openModal() {
        const modal = document.getElementById("iframe-modal");
        const container = document.getElementById("iframe-container");
        if (!storedIframeCode) {
          alert("ยังไม่ได้ใส่โค้ด Iframe ในหน้าแอดมินครับ");
          return;
        }
        modal.classList.remove("hidden");
        container.innerHTML = storedIframeCode;

        const scripts = container.getElementsByTagName("script");
        for (let i = 0; i < scripts.length; i++) {
          const s = document.createElement("script");
          if (scripts[i].src) s.src = scripts[i].src;
          else s.textContent = scripts[i].textContent;
          document.body.appendChild(s);
        }
      }

      function closeModal() {
        document.getElementById("iframe-modal").classList.add("hidden");
        document.getElementById("iframe-container").innerHTML = "";
      }

      function runTimer(targetStr) {
        if (timerInterval) clearInterval(timerInterval);
        const target = new Date(targetStr.replace(/-/g, "/")).getTime();
        if (isNaN(target)) return;

        const update = () => {
          const now = new Date().getTime();
          const diff = target - now;
          const el = document.getElementById("wc-timer");
          if (!el) return;

          if (diff <= 0) {
            el.innerHTML = `<span class="text-red-500 font-bold text-sm">ถึงเวลาแข่งขันแล้ว!</span>`;
            clearInterval(timerInterval);
            return;
          }

          const d = Math.floor(diff / (1000 * 60 * 60 * 24));
          const h = Math.floor(
            (diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)
          );
          const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
          const s = Math.floor((diff % (1000 * 60)) / 1000);
          const pad = (n) => (n < 10 ? "0" + n : n);

          el.innerHTML = `
                    <span class="text-yellow-400 text-xl">${d}</span><span class="text-[10px] text-zinc-500">วัน</span> :
                    <span class="text-yellow-400 text-xl">${pad(
                      h
                    )}</span><span class="text-[10px] text-zinc-500">ชม.</span> :
                    <span class="text-yellow-400 text-xl">${pad(
                      m
                    )}</span><span class="text-[10px] text-zinc-500">นาที</span> :
                    <span class="text-yellow-400 text-xl">${pad(
                      s
                    )}</span><span class="text-[10px] text-zinc-500">วิ</span>
                `;
        };
        update();
        timerInterval = setInterval(update, 1000);
      }

      window.onload = initWorldCup;
    </script>
  </body>
</html>
