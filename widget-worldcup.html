<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        font-family: "Prompt", sans-serif;
      }
      .gold-glow {
        box-shadow: 0 0 15px rgba(212, 175, 55, 0.15);
      }

      /* ซ่อน Scrollbar แต่ลากได้ */
      .hide-scroll::-webkit-scrollbar {
        display: none;
      }
      .hide-scroll {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      /* เปลี่ยนเคอร์เซอร์ตอนคลิกเมาส์ค้าง */
      .cursor-grab {
        cursor: grab;
      }
      .cursor-grabbing {
        cursor: grabbing !important;
      }

      #iframe-container iframe {
        width: 950px !important;
        height: 1200px !important;
        min-height: 1200px !important;
        max-width: none !important;
        border: none !important;
        border-radius: 8px;
        background-color: #fff;
      }

      .glass-card {
        background: linear-gradient(
          135deg,
          rgba(28, 28, 30, 0.85) 0%,
          rgba(12, 12, 14, 0.95) 100%
        );
        border-top: 1px solid rgba(255, 255, 255, 0.15);
        border-left: 1px solid rgba(255, 255, 255, 0.1);
        border-right: 1px solid rgba(197, 160, 89, 0.15);
        border-bottom: 1px solid rgba(197, 160, 89, 0.1);
        border-radius: 16px;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5),
          inset 0 2px 4px rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
      }

      .glass-card::after {
        content: "";
        position: absolute;
        top: 0;
        left: 5%;
        width: 90%;
        height: 40%;
        background: linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.06) 0%,
          rgba(255, 255, 255, 0) 100%
        );
        border-radius: 50% / 0 0 40% 40%;
        pointer-events: none;
      }

      .btn-glass {
        background: linear-gradient(180deg, #ffffff 0%, #e4e4e7 100%);
        color: #000000;
        border-top: 1px solid #ffffff;
        border-bottom: 1px solid #a1a1aa;
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(255, 255, 255, 0.1);
        transition: all 0.2s ease;
      }
      .btn-glass:hover {
        transform: translateY(-1px);
      }
    </style>
  </head>
  <body class="bg-transparent m-0 p-0">
    <div
      id="wc-mount"
      class="w-full bg-[#09090b] text-white p-3 rounded-xl border border-zinc-800 shadow-xl relative overflow-hidden font-sans flex flex-col justify-center"
    >
      <div class="flex justify-center items-center py-10">
        <p class="text-zinc-500 animate-pulse text-sm">กำลังดึงข้อมูล...</p>
      </div>
    </div>

    <!-- Modal สำหรับ Iframe -->
    <div
      id="iframe-modal"
      class="fixed inset-0 z-50 bg-black/80 backdrop-blur-sm hidden flex justify-center items-center p-2 md:p-6"
    >
      <div
        class="bg-[#121215] border border-zinc-700 w-full max-w-[1000px] max-h-[95vh] rounded-2xl overflow-hidden flex flex-col shadow-2xl relative"
      >
        <div
          class="p-4 bg-[#1a1a1e] border-b border-zinc-800 flex justify-between items-center shrink-0"
        >
          <span
            class="font-bold text-[#D4AF37] flex items-center gap-2 text-sm"
          >
            ตารางคะแนน & สถิติ
          </span>
          <button
            onclick="closeModal()"
            class="text-zinc-400 hover:text-white bg-zinc-800 hover:bg-red-500 px-3 py-1 rounded-lg text-xs font-bold"
          >
            ปิดหน้าต่าง X
          </button>
        </div>
        <div
          id="iframe-container"
          class="overflow-auto flex-grow bg-black/50"
        ></div>
      </div>
    </div>

    <script>
      const DB_URL =
        "https://pcrurldhpubyznrdackb.supabase.co/rest/v1/tbl_worldcup_board";
      const API_KEY = "sb_publishable_iM2V0yw1KKfpGVwa7LwDXg_KbL3lGG0";
      let timerInterval = null;
      let storedIframeCode = "";

      async function initWorldCup() {
        const mount = document.getElementById("wc-mount");
        try {
          const res = await fetch(DB_URL, {
            headers: { apikey: API_KEY, Authorization: `Bearer ${API_KEY}` },
          });
          const data = await res.json();

          if (!data || data.length === 0) {
            mount.innerHTML =
              '<p class="text-center text-zinc-500 py-8 text-sm">ไม่มีข้อมูล</p>';
            return;
          }

          const d = data[data.length - 1];
          const list = d.matches_list || [];
          storedIframeCode = d.iframe_code || "";

          // ส่วนหัว (Header) ที่มีการปรับขนาดตัวหนังสือให้ใหญ่และชัดเจนขึ้น
          let html = `
            <div class="absolute top-0 right-0 w-64 h-64 bg-yellow-500/5 rounded-full blur-2xl pointer-events-none"></div>

            <div class="bg-gradient-to-r from-[#121215] via-[#1a1a1e] to-[#121215] px-5 py-3 rounded-lg border border-zinc-800 flex flex-col md:flex-row justify-between items-center gap-3 mb-4 gold-glow relative z-10">
                <div class="flex items-center gap-3 w-full md:w-auto justify-between md:justify-start">
                    <div>
                        <!-- ขยายตัวหนังสือชื่อทัวร์นาเมนต์ให้ใหญ่ขึ้น (text-2xl / text-3xl) -->
                        <h1 class="text-2xl md:text-3xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-white via-zinc-200 to-zinc-400 leading-tight">${d.header_title}</h1>
                        <div class="flex items-center gap-2 mt-2">
                            <!-- ขยายขนาดป้ายจำนวนแมตช์ให้ใหญ่ขึ้นเล็กน้อย (text-xs) -->
                            <span class="text-black bg-white px-2 py-0.5 rounded text-xs font-bold">${d.today_count}</span> 
                            <!-- ขยายข้อความรอบการแข่งขันให้ใหญ่ขึ้น (text-sm) -->
                            <span class="text-[#A1A1AA] text-sm font-medium">${d.upcoming_count}</span>
                        </div>
                    </div>
                </div>

                <div class="bg-black/60 border border-zinc-700 px-3 py-1.5 rounded-lg flex items-center gap-2 w-full md:w-auto justify-center">
                    <span class="text-[10px] text-zinc-400">เตะนัดถัดไป</span>
                    <div id="wc-timer" class="flex items-baseline gap-1 font-mono font-bold text-xs">
                        <span class="text-yellow-400">0</span><span class="text-[9px] text-zinc-500">ว</span>:
                        <span class="text-yellow-400">00</span><span class="text-[9px] text-zinc-500">ช</span>:
                        <span class="text-yellow-400">00</span><span class="text-[9px] text-zinc-500">น</span>:
                        <span class="text-yellow-400">00</span><span class="text-[9px] text-zinc-500">วิ</span>
                    </div>
                </div>
            </div>
          `;

          if (list.length === 0) {
            html += `<p class="text-center text-zinc-500 py-4 text-xs">ยังไม่มีแมตช์</p>`;
          } else {
            html += `<div id="slider-container" class="flex flex-row overflow-x-auto gap-3 relative z-10 pb-1 snap-x snap-mandatory hide-scroll cursor-grab">`;

            list.forEach((m) => {
              const hRate = m.rate || 50;
              const aRate = 100 - hRate;

              html += `
                <div class="glass-card min-w-[240px] md:min-w-[260px] flex-none snap-start p-3 flex flex-col justify-between select-none">
                    <div class="relative z-10">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-[10px] font-semibold text-[#A1A1AA] font-mono">${
                              m.date
                            }</span>
                            <span class="bg-white text-black text-[8px] font-black px-1.5 py-[2px] rounded uppercase">${
                              m.badge
                            }</span>
                        </div>

                        <div class="grid grid-cols-3 items-center my-1 pointer-events-none">
                            <div class="flex flex-col items-center text-center gap-1">
                                <div class="w-10 h-6 rounded bg-[#0a0a0c] border border-zinc-700/50 flex justify-center">
                                    <img src="${
                                      m.h_flag
                                    }" alt="" class="w-full h-full object-cover" onerror="this.src='https://flagcdn.com/w40/un.png'">
                                </div>
                                <span class="font-bold text-[11px] text-white line-clamp-1">${
                                  m.h_name
                                }</span>
                            </div>

                            <div class="flex justify-center">
                                <span class="text-[9px] font-black text-[#D4AF37] bg-black/40 px-2 py-0.5 rounded-full border border-[#D4AF37]/40">VS</span>
                            </div>

                            <div class="flex flex-col items-center text-center gap-1">
                                <div class="w-10 h-6 rounded bg-[#0a0a0c] border border-zinc-700/50 flex justify-center">
                                    <img src="${
                                      m.a_flag
                                    }" alt="" class="w-full h-full object-cover" onerror="this.src='https://flagcdn.com/w40/un.png'">
                                </div>
                                <span class="font-bold text-[11px] text-white line-clamp-1">${
                                  m.a_name
                                }</span>
                            </div>
                        </div>
                    </div>

                    <div class="relative z-10">
                        <div class="mt-2 pt-1.5 border-t border-zinc-700/50 pointer-events-none">
                            <div class="flex justify-between text-[9px] mb-1">
                                <span class="text-zinc-300">เซียนเลือก <strong class="text-[#F3E5AB] ml-0.5">${hRate}%</strong></span>
                                <span class="text-zinc-400">${aRate}%</span>
                            </div>
                            <div class="w-full bg-black/60 h-1 rounded-full overflow-hidden flex border border-zinc-800/80">
                                <div class="bg-gradient-to-r from-[#D4AF37] to-[#F3E5AB] h-full" style="width: ${hRate}%"></div>
                                <div class="bg-zinc-600/50 h-full" style="width: ${aRate}%"></div>
                            </div>
                        </div>

                        <div class="flex justify-between items-center mt-2 pt-1.5 border-t border-zinc-700/50">
                            <span class="text-yellow-400 font-mono font-bold text-[10px] flex items-center gap-1 pointer-events-none">
                                <span class="w-1 h-1 rounded-full bg-yellow-400 animate-pulse"></span>
                                ${m.time}
                            </span>
                            <a href="${
                              m.url || "#"
                            }" target="_blank" class="text-[10px] font-semibold text-[#e4e4e7] hover:text-[#F3E5AB] flex items-center relative z-20">
                                วิเคราะห์ <span class="text-[#D4AF37] ml-0.5">→</span>
                            </a>
                        </div>
                    </div>
                </div>
              `;
            });

            html += `</div>`;
          }

          html += `
            <footer class="mt-2 pt-2 border-t border-zinc-800/50 flex justify-center md:justify-start relative z-10">
                <button onclick="openModal()" class="btn-glass font-bold px-4 py-1.5 flex items-center gap-1.5 text-[11px] cursor-pointer">
                    <span>ดูโปรแกรมทั้งหมด</span>
                    <svg class="w-3 h-3 fill-current" viewBox="0 0 24 24"><path d="M5 13h11.17l-4.88 4.88c-.39.39-.39 1.03 0 1.42.39.39 1.02.39 1.41 0l6.59-6.59c.39-.39.39-1.02 0-1.41l-6.58-6.6a.9959.9959 0 0 0-1.41 0c-.39.39-.39 1.02 0 1.41L16.17 11H5c-.55 0-1 .45-1 1s.45 1 1 1z"/></svg>
                </button>
            </footer>
          `;

          mount.innerHTML = html;

          if (list.length > 0) enableDragScroll();
          if (d.countdown_target) runTimer(d.countdown_target);
        } catch (e) {
          mount.innerHTML = `<p class="text-red-500 text-center py-4 text-sm">เกิดข้อผิดพลาด</p>`;
        }
      }

      function enableDragScroll() {
        const slider = document.getElementById("slider-container");
        let isDown = false,
          startX,
          scrollLeft;
        slider.addEventListener("mousedown", (e) => {
          isDown = true;
          slider.classList.add("cursor-grabbing");
          slider.style.scrollSnapType = "none";
          startX = e.pageX - slider.offsetLeft;
          scrollLeft = slider.scrollLeft;
        });
        slider.addEventListener("mouseleave", () => {
          isDown = false;
          slider.classList.remove("cursor-grabbing");
          slider.style.scrollSnapType = "x mandatory";
        });
        slider.addEventListener("mouseup", () => {
          isDown = false;
          slider.classList.remove("cursor-grabbing");
          slider.style.scrollSnapType = "x mandatory";
        });
        slider.addEventListener("mousemove", (e) => {
          if (!isDown) return;
          e.preventDefault();
          const x = e.pageX - slider.offsetLeft;
          slider.scrollLeft = scrollLeft - (x - startX) * 1.5;
        });
      }

      function openModal() {
        if (!storedIframeCode || storedIframeCode.trim() === "")
          return alert("ยังไม่ได้ใส่ข้อมูลลิงก์ Iframe");
        const modal = document.getElementById("iframe-modal");
        const container = document.getElementById("iframe-container");
        modal.classList.remove("hidden");
        let finalHTML = storedIframeCode.trim();
        if (finalHTML.startsWith("http"))
          finalHTML = `<iframe src="${finalHTML}"></iframe>`;
        container.innerHTML = finalHTML;
      }

      function closeModal() {
        document.getElementById("iframe-modal").classList.add("hidden");
        document.getElementById("iframe-container").innerHTML = "";
      }

      function runTimer(targetStr) {
        if (timerInterval) clearInterval(timerInterval);
        const target = new Date(targetStr.replace(/-/g, "/")).getTime();
        if (isNaN(target)) return;

        const update = () => {
          const diff = target - new Date().getTime();
          const el = document.getElementById("wc-timer");
          if (!el) return;
          if (diff <= 0) {
            el.innerHTML = `<span class="text-red-500 font-bold text-xs">ถึงเวลาแข่ง!</span>`;
            return clearInterval(timerInterval);
          }
          const d = Math.floor(diff / (1000 * 60 * 60 * 24));
          const h = Math.floor(
            (diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)
          );
          const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
          const s = Math.floor((diff % (1000 * 60)) / 1000);
          const pad = (n) => (n < 10 ? "0" + n : n);

          el.innerHTML = `
            <span class="text-yellow-400 text-sm">${d}</span><span class="text-[9px] text-zinc-500">ว</span> :
            <span class="text-yellow-400 text-sm">${pad(
              h
            )}</span><span class="text-[9px] text-zinc-500">ช</span> :
            <span class="text-yellow-400 text-sm">${pad(
              m
            )}</span><span class="text-[9px] text-zinc-500">น</span> :
            <span class="text-yellow-400 text-sm">${pad(
              s
            )}</span><span class="text-[9px] text-zinc-500">วิ</span>
          `;
        };
        update();
        timerInterval = setInterval(update, 1000);
      }

      window.onload = initWorldCup;
    </script>
  </body>
</html>
