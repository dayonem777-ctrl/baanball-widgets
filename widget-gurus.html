<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title> 
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Kanit', sans-serif; }
        body, html { background: transparent; width: 100%; }

        .vip-container { width: 100%; max-width: 1000px; margin: 0 auto; }
        
        .vip-header-title { 
            text-align: center; font-size: 1.5rem; font-weight: 800; 
            color: #FFD700; margin-bottom: 20px; 
            text-shadow: 0 2px 15px rgba(255,215,0,0.4);
            letter-spacing: 0.5px;
        }

        /* จัดเลย์เอาต์แบบ "บล็อกการ์ด" อัตโนมัติ (เพิ่มกี่คนก็เรียงต่อลงมา) */
        .guru-grid-blocks {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 16px;
        }

        /* ธีมบล็อก ดำ-ทอง */
        .guru-block-card {
            background: #111111; /* ดำสนิทพรีเมียม */
            border: 1.5px solid #D4AF37; /* ขอบทอง Classic Gold */
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 6px 20px rgba(0,0,0,0.8);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex; flex-direction: column;
        }
        .guru-block-card:hover { 
            transform: translateY(-4px); 
            box-shadow: 0 10px 25px rgba(212,175,55,0.25);
        }

        /* ส่วนหัวบล็อก: รูปโปรไฟล์ + ชื่อทอง + สถิติซิลเวอร์ */
        .block-top {
            background: #1a1a1a;
            padding: 12px 16px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid #2a2a2a;
        }
        .profile-flex { display: flex; align-items: center; gap: 12px; }
        .guru-img {
            width: 48px; height: 48px; border-radius: 50%;
            object-fit: cover; border: 2px solid #FFD700;
            background: #333;
        }
        .guru-name { font-weight: 800; font-size: 1rem; color: #FFD700; line-height: 1.2; }
        .guru-record { font-size: 0.78rem; color: #C0C0C0; font-weight: 400; } /* สีซิลเวอร์ตามสั่ง */

        /* ส่วนเนื้อหาในบล็อก */
        .block-body { padding: 16px; text-align: center; flex-grow: 1; display:flex; flex-direction:column; justify-content:center;}
        
        .label-silver { font-size: 0.75rem; color: #888888; font-weight: 400; margin-bottom: 2px; }
        
        /* ตรงคู่บอลวิเคราะห์: สีขาวมองชัด */
        .match-white { font-size: 1.05rem; color: #FFFFFF; font-weight: 700; margin-bottom: 12px; }
        
        /* ตรงฟันธงทีเด็ด: สีเขียวสว่างมองชัดเจน */
        .pick-green { 
            font-size: 1.18rem; color: #00FF66; font-weight: 800; 
            background: rgba(0,255,102,0.06); border: 1px dashed rgba(0,255,102,0.4);
            padding: 8px 12px; border-radius: 8px;
            text-shadow: 0 0 10px rgba(0,255,102,0.45);
        }

        .block-footer {
            background: #0a0a0a; padding: 8px 16px; font-size: 0.78rem;
            color: #666; text-align: right; border-top: 1px solid #222;
        }

        /* ป้ายสถานะ */
        .st-win { background: #059669; color: #fff; padding: 3px 10px; border-radius: 50px; font-size: 0.75rem; font-weight:800;}
        .st-lose { background: #DC2626; color: #fff; padding: 3px 10px; border-radius: 50px; font-size: 0.75rem; font-weight:800;}
        .st-wait { background: #D97706; color: #fff; padding: 3px 10px; border-radius: 50px; font-size: 0.75rem; font-weight:800;}
    </style>
</head>
<body>

    <div class="vip-container" id="gurus-mount">
        <p style="text-align:center; padding:50px; color:#888;">กำลังดึงข้อมูลทีเด็ดเซียนจากระบบคลาวด์...</p>
    </div>

    <script>
        const DB_URL = 'https://pcrurldhpubyznrdackb.supabase.co/rest/v1/wb_gurus_pro';
        const API_KEY = 'sb_publishable_iM2V0yw1KKfpGVwa7LwDXg_KbL3lGG0';

        function getBadge(st) {
            if(st === 'WIN') return `<span class="st-win">✔ WIN</span>`;
            if(st === 'LOSE') return `<span class="st-lose">✖ LOSE</span>`;
            return `<span class="st-wait">⏳ WAIT</span>`;
        }

        async function initGurus() {
            const mount = document.getElementById('gurus-mount');
            try {
                const res = await fetch(DB_URL, { headers: { 'apikey': API_KEY, 'Authorization': `Bearer ${API_KEY}` } });
                const data = await res.json();
                
                if(!data || data.length === 0) { mount.innerHTML = '<p style="text-align:center; color:#999; padding:40px;">ยังไม่มีข้อมูลในระบบฐานข้อมูล</p>'; return; }

                const d = data[data.length - 1];
                const list = d.gurus_list || [];

                if(list.length === 0) { mount.innerHTML = `<div class="vip-header-title">${d.header_title}</div><p style="text-align:center; color:#666;">ยังไม่ได้เพิ่มรายชื่อเซียนในหน้าหลังบ้านแอดมิน</p>`; return; }

                let html = `<div class="vip-header-title">${d.header_title}</div><div class="guru-grid-blocks">`;
                
                list.forEach(g => {
                    html += `
                        <div class="guru-block-card">
                            <div class="block-top">
                                <div class="profile-flex">
                                    <img src="${g.img}" class="guru-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/4140/4140048.png'">
                                    <div>
                                        <div class="guru-name">${g.name}</div>
                                        <div class="guru-record">${g.record || 'สถิติรออัปเดต'}</div>
                                    </div>
                                </div>
                                <div>${getBadge(g.status)}</div>
                            </div>
                            <div class="block-body">
                                <div class="label-silver">คู่บอลวิเคราะห์</div>
                                <div class="match-white">${g.match || '-'}</div>
                                <div class="label-silver mb-1">ฟันธงทีเด็ด</div>
                                <div class="pick-green">${g.pick || '-'}</div>
                            </div>
                            <div class="block-footer">ทีเด็ดระดับ VIP</div>
                        </div>
                    `;
                });

                html += `</div>`;
                mount.innerHTML = html;
            } catch(e) { mount.innerHTML = `<p style="color:red; text-align:center;">โหลดล้มเหลว: ${e.message}</p>`; }
        }

        initGurus();
    </script>
</body>
</html>
