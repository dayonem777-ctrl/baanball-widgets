<!DOCTYPE html>
<html lang="th">
<body style="margin:0; padding:0; background:transparent; font-family:Prompt, sans-serif;">
    <div id="guru-container" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:15px;"></div>

    <script>
        const DB_URL = "https://pcrurldhpubyznrdackb.supabase.co/rest/v1/wb_gurus_pro";
        const API_KEY = "sb_publishable_iM2V0yw1KKfpGVwa7LwDXg_KbL3lGG0";

        fetch(DB_URL, { headers: { 'apikey': API_KEY, 'Authorization': 'Bearer ' + API_KEY } })
        .then(r => r.json())
        .then(data => {
            if(!data || data.length === 0) return;
            const gurus = data[data.length - 1].gurus_list || [];
            
            document.getElementById("guru-container").innerHTML = gurus.map(g => `
                <div style="background:#0c0c0c; border:1px solid #C5A059; border-radius:12px; padding:15px; color:white; box-shadow:0 4px 15px rgba(0,0,0,0.5);">
                    <div style="display:flex; align-items:center; gap:10px; margin-bottom:12px;">
                        <img src="${g.img}" style="width:45px; height:45px; border-radius:50%; border:2px solid #C5A059;">
                        <div style="flex-grow:1;">
                            <div style="font-weight:bold; font-size:14px;">${g.name}</div>
                            <div style="font-size:10px; color:#C5A059; text-transform:uppercase;">${g.views || '100'} Views | ${g.percent || '80%'} Win</div>
                        </div>
                    </div>
                    
                    <div style="font-size:13px; font-weight:bold; color:#ccc; margin-bottom:8px;">⚽ ${g.match}</div>
                    <div style="background:rgba(197, 160, 89, 0.1); border-left:3px solid #C5A059; padding:8px; font-size:12px; margin-bottom:10px;">
                        🎯 <span style="font-weight:bold; color:#fff;">${g.pick}</span>
                    </div>

                    <div style="display:flex; justify-content:space-between; align-items:center; border-top:1px solid #333; pt:10px;">
                        <div style="font-size:10px; color:#888;">สถิติย้อนหลัง</div>
                        <div style="font-size:12px;">${renderStats(g.stats)}</div>
                    </div>
                </div>
            `).join("");
        });

        function renderStats(stats) {
            const arr = Array.isArray(stats) ? stats : (stats || "").split(',');
            return arr.map(s => s === 'W' ? '✅' : s === 'L' ? '❌' : '➖').join(' ');
        }
    </script>
</body>
</html>
