<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        font-family: "Prompt", sans-serif;
      }
      .card-border {
        border: 1px solid #c5a059;
      } /* สีทอง */
    </style>
  </head>
  <body class="bg-transparent p-2">
    <div
      id="guru-container"
      class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"
    ></div>

    <script>
      const DB_URL =
        "https://pcrurldhpubyznrdackb.supabase.co/rest/v1/wb_gurus_pro";
      const API_KEY = "sb_publishable_iM2V0yw1KKfpGVwa7LwDXg_KbL3lGG0";

      async function loadGurus() {
        const container = document.getElementById("guru-container");
        try {
          const res = await fetch(DB_URL, {
            headers: { apikey: API_KEY, Authorization: `Bearer ${API_KEY}` },
          });
          const data = await res.json();
          if (!data || data.length === 0) return;

          const gurus = data[data.length - 1].gurus_list || [];
          container.innerHTML = gurus
            .map(
              (g) => `
                <div class="bg-[#0c0c0c] card-border text-white p-4 rounded-xl shadow-2xl">
                    <div class="flex items-center gap-3 mb-3">
                        <img src="${
                          g.img
                        }" class="w-10 h-10 rounded-full border border-[#C5A059] object-cover">
                        <div class="flex-grow">
                            <h3 class="font-bold text-sm text-white">${
                              g.name
                            } <span class="text-[#C5A059] font-normal">• ${
                g.views || "100"
              } views</span></h3>
                            <div class="text-xs text-gray-400">สถิติ: ${renderStats(
                              g.stats || []
                            )}</div>
                        </div>
                        <div class="border border-[#C5A059] text-[#C5A059] px-2 py-1 rounded font-bold text-sm">${
                          g.percent || "80%"
                        }</div>
                    </div>
                    
                    <div class="text-base font-bold text-gray-300 mb-2 truncate">${
                      g.match
                    }</div>
                    
                    <div class="text-xs text-white font-medium bg-white/5 p-2 rounded border-l-2 border-[#C5A059]">
                        ${g.status === "WIN" ? "⭐" : "📖"} ${g.pick}
                    </div>
                </div>
            `
            )
            .join("");
        } catch (e) {
          console.error(e);
        }
      }

      function renderStats(arr) {
        // รองรับทั้ง Array หรือ string ถ้าในหลังบ้านกรอกเป็น W,W,L
        const statsArray = Array.isArray(arr) ? arr : arr.split(",");
        return statsArray
          .map((s) => (s === "W" ? "✅" : s === "L" ? "❌" : "➖"))
          .join(" ");
      }
      loadGurus();
    </script>
  </body>
</html>
