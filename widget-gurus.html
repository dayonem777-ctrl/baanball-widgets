<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOPFORM369 - Gurus VIP Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { font-family: 'Prompt', sans-serif; }
        .gold-border { border: 1px solid rgba(212, 175, 55, 0.3); }
        .gold-glow:hover { border-color: rgba(212, 175, 55, 0.6); box-shadow: 0 0 20px rgba(212, 175, 55, 0.1); }
    </style>
</head>
<body class="bg-transparent p-2 md:p-6 select-none">

    <div id="gurus-mount" class="max-w-7xl mx-auto">
        <div class="flex justify-center items-center py-20 text-zinc-500 animate-pulse">
            กำลังดึงข้อมูลทีเด็ดเซียนจากระบบคลาวด์...
        </div>
    </div>

    <script>
        const DB_URL = 'https://pcrurldhpubyznrdackb.supabase.co/rest/v1/wb_gurus_pro';
        const API_KEY = 'sb_publishable_iM2V0yw1KKfpGVwa7LwDXg_KbL3lGG0';

        function getBadge(st) {
            if(st === 'WIN') return `<span class="bg-emerald-500 text-white text-[10px] font-black px-2 py-0.5 rounded-full">✔ WIN</span>`;
            if(st === 'LOSE') return `<span class="bg-red-500 text-white text-[10px] font-black px-2 py-0.5 rounded-full">✖ LOSE</span>`;
            return `<span class="bg-amber-500 text-white text-[10px] font-black px-2 py-0.5 rounded-full">⏳ WAIT</span>`;
        }

        async function initGurus() {
            const mount = document.getElementById('gurus-mount');
            try {
                const res = await fetch(DB_URL, { 
                    headers: { 'apikey': API_KEY, 'Authorization': `Bearer ${API_KEY}` } 
                });
                const data = await res.json();
                
                // --- จุดแก้บั๊ก (Safety Check) ---
                if(!data || data.length === 0) { 
                    mount.innerHTML = `
                        <div class="bg-[#111] p-10 rounded-2xl border border-zinc-800 text-center">
                            <p class="text-zinc-500">ยังไม่มีข้อมูลเซียนในระบบ</p>
                            <p class="text-zinc-600 text-xs mt-2">กรุณาไปที่หน้า Admin Board 2 แล้วกด "อัปเดตข้อมูล" เพื่อเริ่มใช้งาน</p>
                        </div>`;
                    return; 
                }

                const d = data[data.length - 1];
                const list = d.gurus_list || [];

                let html = `
                    <div class="text-center mb-8">
                        <h2 class="text-2xl md:text-3xl font-black text-[#D4AF37] tracking-tight uppercase">${d.header_title}</h2>
                        <div class="h-1 w-20 bg-[#D4AF37] mx-auto mt-2 rounded-full"></div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                `;
                
                list.forEach(g => {
                    html += `
                        <div class="bg-[#111111] border border-zinc-800 rounded-2xl overflow-hidden flex flex-col gold-glow transition-all duration-300">
                            <div class="bg-[#1a1a1a] p-4 flex items-center justify-between border-b border-zinc-800/50">
                                <div class="flex items-center gap-3">
                                    <div class="relative">
                                        <img src="${g.img}" class="w-12 h-12 rounded-full object-cover border-2 border-[#D4AF37] bg-zinc-800" onerror="this.src='https://cdn-icons-png.flaticon.com/512/4140/4140048.png'">
                                        <div class="absolute -bottom-1 -right-1 bg-[#D4AF37] text-black text-[8px] font-bold px-1 rounded">VIP</div>
                                    </div>
                                    <div>
                                        <div class="font-bold text-[#D4AF37] text-sm md:text-base">${g.name}</div>
                                        <div class="text-[10px] text-zinc-400 font-medium uppercase tracking-wider">${g.record || 'TOP FORM'}</div>
                                    </div>
                                </div>
                                <div>${getBadge(g.status)}</div>
                            </div>

                            <div class="p-5 flex-grow flex flex-col justify-center text-center">
                                <div class="text-[10px] text-zinc-500 uppercase tracking-widest mb-1">วิเคราะห์คู่บอล</div>
                                <div class="text-white font-bold text-sm md:text-lg mb-4">${g.match || '-'}</div>
                                
                                <div class="text-[10px] text-zinc-500 uppercase tracking-widest mb-2">ฟันธงทีเด็ด</div>
                                <div class="bg-emerald-500/5 border border-emerald-500/20 py-2 px-4 rounded-xl">
                                    <span class="text-emerald-400 font-black text-lg md:text-xl drop-shadow-[0_0_8px_rgba(52,211,153,0.3)]">${g.pick || '-'}</span>
                                </div>
                            </div>

                            <div class="bg-black/40 px-4 py-2 text-center border-t border-zinc-800/30">
                                <span class="text-[9px] text-zinc-600 font-bold tracking-tighter uppercase">Exclusively for Topform369 Members</span>
                            </div>
                        </div>
                    `;
                });

                html += `</div>`;
                mount.innerHTML = html;

            } catch(e) { 
                mount.innerHTML = `<div class="text-red-500 text-center py-10 bg-red-500/5 rounded-xl border border-red-500/20 font-bold">เกิดข้อผิดพลาด: ${e.message}</div>`; 
            }
        }

        initGurus();
    </script>
</body>
</html>
